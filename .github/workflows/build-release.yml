name: Build & Release Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: false
        default: ''

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies (skip postinstall)
        run: npm install --ignore-scripts
        shell: cmd

      - name: Download obs-studio-node binaries
        run: node scripts/setup-osn.js
        shell: cmd

      - name: Verify osn directory
        run: |
          echo "Checking osn/ contents..."
          dir osn
        shell: cmd

      - name: Create placeholder icon if missing
        run: node -e "const f=require('fs'),p=require('path');const d=p.join('assets');if(!f.existsSync(d))f.mkdirSync(d,{recursive:true});const i=p.join(d,'icon.png');if(!f.existsSync(i)){const b=Buffer.from([0x89,0x50,0x4e,0x47,0x0d,0x0a,0x1a,0x0a,0x00,0x00,0x00,0x0d,0x49,0x48,0x44,0x52,0x00,0x00,0x00,0x01,0x00,0x00,0x00,0x01,0x08,0x02,0x00,0x00,0x00,0x90,0x77,0x53,0xde,0x00,0x00,0x00,0x0c,0x49,0x44,0x41,0x54,0x08,0xd7,0x63,0xe8,0xb2,0x4c,0x00,0x00,0x00,0x04,0x00,0x01,0xf4,0xd2,0xc5,0x40,0x00,0x00,0x00,0x00,0x49,0x45,0x4e,0x44,0xae,0x42,0x60,0x82]);f.writeFileSync(i,b);console.log('Created placeholder icon')}"
        shell: cmd

      - name: Build Windows installer
        run: npx electron-builder --win --config electron-builder.config.js
        shell: cmd
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        run: dir dist
        shell: cmd

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe
          retention-days: 90

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (on manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || '1.0.0' }}
          name: Apex Revenue Desktop v${{ github.event.inputs.version || '1.0.0' }}
          files: dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build & Release Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: false
        default: ''

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies (skip postinstall)
        run: npm install --ignore-scripts
        shell: cmd

      - name: Download obs-studio-node binaries
        run: node scripts/setup-osn.js
        shell: cmd

      - name: Verify osn directory
        run: |
          echo "Checking osn/ contents..."
          dir osn
        shell: cmd

      - name: Verify icon exists
        run: |
          echo "Checking assets/icon.png..."
          dir assets\icon.png
        shell: cmd

      - name: Decode code signing certificate
        run: |
          echo "${{ secrets.WIN_CSC_LINK }}" > cert.b64
          certutil -decode cert.b64 cert.pfx
          del cert.b64
        shell: cmd

      - name: Build Windows installer
        run: npx electron-builder --win --config electron-builder.config.js
        shell: cmd
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: cert.pfx
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: List build output
        run: dir dist
        shell: cmd

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe
          retention-days: 90

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (on manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || '1.0.0' }}
          name: Apex Revenue Desktop v${{ github.event.inputs.version || '1.0.0' }}
          files: dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

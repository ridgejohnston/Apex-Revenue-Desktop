name: Build & Release

on:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build renderer
        run: npx webpack --config webpack.renderer.js --mode production

      - name: Build installer
        run: npx electron-builder --win --publish never

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $bucket  = "s3://apex-revenue-updates-994438967527"

          # Upload all build artifacts (exes + blockmaps) except the unpacked folder
          Get-ChildItem dist -File | Where-Object { $_.Name -notlike "builder-*" } | ForEach-Object {
            Write-Host "Uploading $($_.Name)..."
            aws s3 cp $_.FullName "$bucket/$($_.Name)"
          }

          # Upload latest.yml last — this is what triggers the update on installed apps
          Write-Host "Publishing latest.yml (v$version)..."
          aws s3 cp dist\latest.yml "$bucket/latest.yml"
